- name: Deploy Upmon backend
  hosts: servers
  gather_facts: no
  become: no

  tasks:
    - name: Install backend Python dependencies
      ansible.builtin.command:
        cmd: ~/.local/bin/uv sync --frozen
        chdir: "{{ app_dir }}"
      tags: [push-backend]

    - name: Mark backend for restart after code push
      ansible.builtin.command:
        cmd: /bin/true
      changed_when: true
      notify: restart backend
      tags: [push-backend]

    - name: Sync agent API keys
      ansible.builtin.command:
        cmd: python3 {{ repo_root }}/ansible/scripts/sync_agent_keys.py
      delegate_to: localhost
      run_once: true
      tags: [push-backend, push-agent-config]

    - name: Build agents.json
      vars:
        enriched: "{{ lookup('file', '~/.cache/rlocal/rofi-vscode/upmon_agents.enriched.json') | from_json }}"
        backend_sites: "{{ enriched.sites | map('dict2items') | map('rejectattr', 'key', 'equalto', 'ssh_host') | map('items2dict') | list }}"
      ansible.builtin.copy:
        content: "{{ {'sites': backend_sites} | to_nice_json }}\n"
        dest: "{{ app_dir }}/backend/agents.json"
        mode: "0644"
      notify: restart backend
      tags: [push-backend, push-agent-config]

    - name: Template backend .env.local
      ansible.builtin.template:
        src: backend.env.local.j2
        dest: "{{ app_dir }}/backend/.env.local"
        mode: "0600"
      notify: restart backend
      tags: [push-backend]

    - name: Template backend service
      ansible.builtin.template:
        src: upmon-backend.service.j2
        dest: ~/.config/systemd/user/upmon-backend.service
        mode: "0644"
      notify:
        - reload systemd
        - restart backend
      tags: [push-backend]

    - name: Enable and start backend
      ansible.builtin.systemd:
        name: upmon-backend
        enabled: true
        state: started
        scope: user

    - name: Wait for backend /health
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ lookup('pipe', 'rpass port get ' + inventory_hostname + '/upmon-backend') }}/health"
        method: GET
        status_code: 200
      register: health_result
      until: health_result.status == 200
      retries: 6
      delay: 5

  handlers:
    - name: reload systemd
      ansible.builtin.systemd:
        daemon_reload: true
        scope: user

    - name: restart backend
      ansible.builtin.systemd:
        name: upmon-backend
        state: restarted
        scope: user
