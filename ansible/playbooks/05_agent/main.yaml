- name: Deploy upmon-agent to target servers
  hosts: localhost
  gather_facts: no

  vars:
    agent_sites: "{{ (lookup('file', '~/.cache/rlocal/rofi-vscode/upmon_agents.enriched.json') | from_json).sites }}"
    agent_by_dest: >-
      {{
        agent_sites
        | groupby('ssh_dest')
        | items2dict(key_name=0, value_name=1)
      }}

  tasks:
    - name: Sync agent API keys
      ansible.builtin.command:
        cmd: python3 {{ repo_root }}/ansible/scripts/sync_agent_keys.py
      tags: [push-agent]

    - name: Create temp dir
      ansible.builtin.tempfile:
        state: directory
      register: tmpdir
      tags: [push-agent]

    - name: Template agent config per destination
      ansible.builtin.copy:
        content: "{{ lookup('template', repo_root + '/backend/scripts/upmon-agent/config.json.j2') }}"
        dest: "{{ tmpdir.path }}/{{ item.value[0].ssh_host }}.json"
        mode: "0644"
      vars:
        upmon_agent_api_keys: "{{ item.value | map(attribute='agent_api_key') | list | unique }}"
      loop: "{{ agent_by_dest | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      tags: [push-agent]

    - name: Deploy agent to target
      ansible.builtin.shell: |
        ssh {{ item.value[0].ssh_host }} 'mkdir -p ~/app/upmon-agent' && \
        scp {{ repo_root }}/backend/scripts/upmon-agent/main.py {{ item.value[0].ssh_host }}:~/app/upmon-agent/main.py && \
        scp {{ tmpdir.path }}/{{ item.value[0].ssh_host }}.json {{ item.value[0].ssh_host }}:~/app/upmon-agent/config.json
      loop: "{{ agent_by_dest | dict2items }}"
      loop_control:
        label: "{{ item.key }}"
      tags: [push-agent]

    - name: Remove temp dir
      ansible.builtin.file:
        path: "{{ tmpdir.path }}"
        state: absent
      tags: [push-agent]
